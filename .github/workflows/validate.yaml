name: validate
on: 
  pull_request: 
    paths: 
      - "k8s/**"
      - "k8s-api/**" # 1. Thêm đường dẫn để trigger workflow khi có thay đổi

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/
      
      - name: Run Kubeconform
        run: kubeconform -strict -ignore-missing-schemas -summary k8s/ k8s-api/