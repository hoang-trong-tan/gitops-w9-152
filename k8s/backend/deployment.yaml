apiVersion: apps/v1                                                                                              
kind: Deployment                                                                                                 
metadata:                                                                                                        
  name: backend                                                                                                  
  namespace: demo                                                                                                
spec:                                                                                                            
  replicas: 1                                                                                                    
  selector:                                                                                                      
    matchLabels:                                                                                                 
      app: backend                                                                                               
  template:                                                                                                      
    metadata:                                                                                                    
      labels:                                                                                                    
        app: backend                                                                                             
    spec:                                                                                                        
      containers:                                                                                                
      - name: backend                                                                                            
        image: hashicorp/http-echo:1.0                                                                           
        args:                                                                                                    
        - "-text=Hello from Backend API"                                                                         
        ports:                                                                                                   
        - containerPort: 5678 

---
apiVersion: v1 
kind: Service
metadata:
  name: backend
  namespace: demo
spec:
  ports:
  - port: 80
    targetPort: 5678
  selector:
    app: backend