apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: demo
spec:
  args:
  - name: canary-hash

  metrics:
  - name: success-rate
    interval: 10s
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address:  http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: |                                                             
          (sum(rate(flask_http_request_total{namespace="demo", status="200", pod=~"api-{{args.canary-hash}}-.*"}[2m])) / sum(rate(flask_http_request_total{namespace="demo", pod=~"api- {{args.canary-hash}}-.*"}[2m]))) or on() vector(1) 
