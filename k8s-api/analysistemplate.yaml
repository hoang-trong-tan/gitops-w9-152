apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: demo
spec:
  metrics:
  - name: success-rate
    interval: 10s
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address:  http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query:     sum(rate(flask_http_request_total{namespace="demo", status="200", version="v1"}[2m])) / sum(rate(flask_http_request_total{namespace="demo", version="v1"}[2m])) 

