apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-slo-alerts
  namespace: monitoring 
  labels: 
    release: kube-prometheus-stack
spec:
  groups:
  - name: api-slo
    rules:
    - alert: APISuccessRateLow
      expr: (sum(rate(flask_http_request_total{namespace="demo", status="200"}[2m])) / sum(rate(flask_http_request_total{namespace="demo"}[2m]))) < 0.95
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "API Success Rate is low"
        description: "Tỷ lệ thành công của API hiện tại là {{ $value }}, dưới ngưỡng SLO 95%"