apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false

        alertmanager:
          alertmanagerSpec:
            secrets:
            - alertmanager-smtp-password
          config:
            global:
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'laynitroepic@gmail.com'
              smtp_auth_username: 'laynitroepic@gmail.com'
              # smtp_auth_password: 'GMAIL_APP_PASSWORD_PLACEHOLDER'
              smtp_auth_password_file: '/etc/alertmanager/secrets/alertmanager-smtp-password/password'
                                              
            route:
              group_by: ['alertname']
              receiver: 'email-receiver'
              routes:
              - matchers:
                - alertname = "Watchdog"
                receiver: "null"
            receivers:              
            - name: 'null'                                                                                     
            - name: 'email-receiver'                                                                                     
              email_configs:                                                                                             
              - to: 'laynitroepic@gmail.com' 
                send_resolved: true             
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: [CreateNamespace=true, ServerSideApply=true]